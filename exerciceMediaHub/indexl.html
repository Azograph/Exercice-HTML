<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>MediaHub</title>
</head>
<body>
    <header>
        <h1> Media Hub </h1>
        
    </header>
    <main>
        <section class="premier">
            <h2>Cinema </h2>
            <video controls poster="src/fondEcran.jpg">
                <source src="src/mov_bbb.mp4" type="" alt=""/>
            </video>
        </section>

        <section class="second">
            <h2> Streaming </h2>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/j3VzaBcoDAI?si=f9p-ypFZPd2y-OVY" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
        </section>

        <section class="second">
            <h2>Podcast</h2>
            <p> Matmathah - La fille du chat noir</p>
            <audio controls>
                <source src="src/MatmatahLaFilleDuChatNoir.mp3" type="audio/mpeg"/>
            </audio>
        </section>
    </main>
</body>
</html>
