<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css"/>
    <title>Document</title>
</head>
<body>
    <form method="post" action="#" >
        <fieldset> 
            <legend> Infos personnelles </legend>  
            <label> Prenom: </label>
                <input placeholder="Ex:Jacques"type="text" maxlength="20" minlength="2"/></br>
            <label> Nom: </label>
                <input placeholder="Ex:Dubois"type="text" maxlength="20" minlength="2"/></br>
            <label> E-mail: </label>
                <input placeholder="Ex:monMail@FAI.com"type="E-mail"/></br>
            <label> Numéro: </label>
                <input placeholder="Ex:00.11.22.33.44"type="tel"/> </br>
            <label> Mot de passe: </label>
                <input placeholder="EX:P@ssWord" type="password"/></br>
            <label> Age: </label>
                <input placeholder="Ex:15" type="number" /></br>
            <label> Laisser un commentaire: </label></br>
                <textarea placeholder="J'adore ce que vous faites !" cols="70" rows="10"></textarea></br>
            <label> Date de mon commentaire: </label>
                <input type="date"/></br>
            <label> Ma photo: </label>
                <input type="file" accept=".jpg .png .gif"/></br>
        </fieldset>
        <fieldset>
            <legend>Vous préferez </legend>
            <input type="checkbox" checked/> <label> HTML </label><br>
            <input type="checkbox"/> <label> CSS </label><br>
            <input type="checkbox"/> <label> Javascript </label><br>
            <input type="checkbox"/> <label> Ne rien faire </label><br>
        </fieldset>
        <fieldset>
            <legend> Vous vous levez:</legend>
            <input type="radio" name="radio" checked/> <label> Le matin </label><br>
            <input type="radio" name="radio" /> <label> Le midi </label><br>
            <input type="radio" name="radio" /> <label> Le soir </label><br>
            <input type="radio" name="radio"/> <label> En retard ! </label><br>
        </fieldset>
        <fieldset>
            <legend> Fin du formulaire </legend>
            <label>Vous en avez assez ? </label> 
            <select name="form" id="form">
                <optgroup label="Team pas encore"> 
                    <option value="form" > J'en veux plus </option>
                    <option selected="selected" value="form"> C'est super ! </option>
                </optgroup>
                <optgroup label="Team Oula">
                    <option value="form"> J'en ai marre</option>
                    <option value="form"> Pitié !</option>
                </optgroup>
            </select> <br>
            <button type="submit" value="kebab"> Envoyer </button>
            <button type="submit" value="kebab"> Reset </button>
        </fieldset>
    </form>
</body>
</html>
